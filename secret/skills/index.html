<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GameFull</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css?family=Press+Start+2P"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <img class="main_logo" src="logo2.png" alt="logo" />
      <div class="title">
        <h1 class="gamo">Game</h1>
        <h1 class="rithm">Full</h1>
      </div>
    </header>

    <div class="main-wrapper">
      <main id="screen">
        <div id="terminal">
          <div id="logs"></div>
          <div id="cursor-line">
            <span id="typing"></span><span class="cursor">|</span>
          </div>
        </div>

        <div id="punchline" style="display: none">
          <h1 class="wait">⚠️ Wait...</h1>
          <h2 class="scan">🔎 Re-scanning data...</h2>
          <h2 class="success" style="display: none">
            ✅ Hidden pattern detected!
          </h2>

          <div id="reveal" style="display: none">
            <h3>🎯 Skill Found:</h3>
            <h1 class="clown">Getting fooled multiple times 😂</h1>
            <button onclick="window.location.href = '../../index.html'">
              Home
            </button>
          </div>
        </div>
      </main>
    </div>

    <script src="index.js"></script>
  </body>
</html>

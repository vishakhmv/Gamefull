<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8">
  <title>Simon</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css?family=Press+Start+2P" rel="stylesheet">
</head>

<body>
  <a href="instructions.html" id="how-to-play-btn">How to Play</a>

  <h2 id="highscore">High Score: 0</h2>
  <h1 id="level-title">Press A Key to Start</h1>
  <div class="container">
    <div class="row">

      <div type="button" id="green" class="btn green">

      </div>

      <div type="button" id="red" class="btn red">

      </div>
      <div type="button" id="purple" class="btn purple"></div> 
    </div>

    <div class="row">

      <div type="button" id="yellow" class="btn yellow">

      </div>
      <div type="button" id="blue" class="btn blue">

      </div>
      <div type="button" id="orange" class="btn orange"></div>

    </div>

  </div>
  <button class="home" onclick="window.location.href='../index.html'">Home</button>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script src="game.js" charset="utf-8"></script>
</body>

</html>

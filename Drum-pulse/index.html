<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <title>Drum Pulse Drum Kit</title>
    <link
      href="https://fonts.googleapis.com/css?family=Arvo"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>

  <body>
    <button
      class="how_to_use_btn"
      onclick="location.href = 'bk_how_to_use.html'"
    >
      How to use
    </button>
    <h1 class="title">Drum</h1>
    <img class="logo" src="images/main.png" alt="Drum kit logo" />
    <h1>Pulse</h1>
    <h2>Drum Kit</h2>
    <div class="set">
      <div class="row">
        <button class="l drum">w</button>
        <button class="k drum">a</button>
        <button class="j drum">s</button>
        <button class="h drum">d</button>
        <button class="g drum">f</button>
      </div>
      <div class="row">
        <button class="f drum">g</button>
        <button class="d drum">h</button>
        <button class="s drum">j</button>
        <button class="a drum">k</button>
        <button class="w drum">l</button>
      </div>
    </div>
    <button class="simon_btn" onclick="location.href = 'drumkit_simon.html'">
      Play Drum Kit Simon
    </button>
    <button class="home" onclick="window.location.href = '../index.html'">
      Home
    </button>

    <script src="index.js" charset="utf-8"></script>
  </body>
</html>

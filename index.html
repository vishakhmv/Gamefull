<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gamorithm</title>
    <link rel="stylesheet" href="index.css" />
    <link
      href="https://fonts.googleapis.com/css?family=Press+Start+2P"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <img class="main_logo" src="images/logo2.png" alt="logo" />
      <div class="title">
        <h1 class="gamo">Gamo</h1>
        <h1 class="rithm">rithm</h1>
      </div>
      <button class="secrete" onclick="window.location.href = 'secrete.html'">
        secrete
      </button>
    </header>
    <main>
      <div class="card ttg_card">
        <img class="ttg_logo" src="images/ttg.png" alt="Tic Tac Goo logo" />
        <div class="ttg_div">
          <h2 class="tic">Tic</h2>
          <h2 class="tac">Tac</h2>
          <h2 class="goo">goo</h2>
        </div>
      </div>
      <div class="card simon_card">
        <img
          class="simon_master_logo"
          src="images/simon_master.png"
          alt="Simon master logo"
        />
        <div class="sm_div">
          <h2 class="simon">Simon</h2>
          <h2 class="master">Master</h2>
        </div>
      </div>
      <div class="card dp_card">
        <img class="dp_logo" src="images/dp.png" alt="Drom pulse logo" />
        <div class="dp_div">
          <h2 class="drum">Dum</h2>
          <h2 class="pulse">Pulse</h2>
        </div>
      </div>
    </main>
  </body>
</html>

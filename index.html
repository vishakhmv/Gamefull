<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gamorithm</title>
    <link rel="stylesheet" href="index.css" />
    <link
      href="https://fonts.googleapis.com/css?family=Press+Start+2P"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <img class="main_logo" src="images/logo2.png" alt="logo" />
      <div class="title">
        <h1 class="gamo">Gamo</h1>
        <h1 class="rithm">rithm</h1>
      </div>
      <button
        class="secret"
        onclick="window.location.href = '/secret/index.html'"
      >
        secret
      </button>
    </header>
    <div class="color">
      <div class="quote-div">
        <h2 class="quote">Play Like a Gamer. Think Like a Genius.</h2>
      </div>
      <main>
        <div
          class="card ttg_card"
          onclick="window.location.href = 'Tic-Tac-Goo/index.html'"
        >
          <img class="ttg_logo" src="images/ttg.png" alt="Tic Tac Goo logo" />
          <div class="ttg_div">
            <h2 class="tic">Tic</h2>
            <h2 class="tac">Tac</h2>
            <h2 class="goo">goo</h2>
          </div>
        </div>
        <div
          class="card simon_card"
          onclick="window.location.href = 'Simon-master/index.html'"
        >
          <img
            class="simon_master_logo"
            src="images/simon_master.png"
            alt="Simon master logo"
          />
          <div class="sm_div">
            <h2 class="simon">
              <span>S</span>
              <span>i</span>
              <span>m</span>
              <span>o</span>
              <span>n</span>
            </h2>
            <h2 class="master">Master</h2>
          </div>
        </div>
        <div
          class="card dp_card"
          onclick="window.location.href = 'Drum-pulse/index.html'"
        >
          <img class="dp_logo" src="images/dp.png" alt="Drom pulse logo" />
          <div class="dp_div">
            <h2 class="drum">Dum</h2>
            <h2 class="pulse">Pulse</h2>
          </div>
        </div>
      </main>
    </div>
  </body>
  <script>
    window.addEventListener("load", () => {
      alert(
        "Welcome to Gamefull!\n\n" +
          "Please read the following carefully:\n" +
          "1. This page uses audio for certain events—please check your volume.\n" +
          "2. This page may restrict the use of your browser back button in some cases.\n" +
          "3. It is strongly recommended to open this web page in a new browser tab so your main browsing history stays safe.\n" +
          "4. We do not access your browsing history from other tabs and the history in other tabs are safe\n\n" +
          "Thank you for visiting Gamefull"
      );
    });
  </script>
</html>
